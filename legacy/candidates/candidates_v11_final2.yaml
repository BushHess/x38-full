candidates:
  - name: v10_baseline
    description: "V8 Apex current defaults"
    params: {}

  # Cycle: no boost, no penalty — pure awareness (establishes if cycle itself hurts)
  - name: v11_cycle_neutral
    strategy: v11_hybrid
    description: "Cycle detection active but no adjustments"
    params:
      enable_cycle_phase: true
      cycle_early_aggression: 1.0
      cycle_early_trail_mult: 3.5
      cycle_late_aggression: 1.0
      cycle_late_trail_mult: 3.5
      cycle_late_max_exposure: 1.0

  # Cycle early boost with no trail change, 3-bar hysteresis
  - name: v11_cycle_boost_only
    strategy: v11_hybrid
    description: "Cycle early aggression 1.20 only, no trail/late changes"
    params:
      enable_cycle_phase: true
      cycle_early_aggression: 1.20
      cycle_early_trail_mult: 3.5
      cycle_late_aggression: 1.0
      cycle_late_trail_mult: 3.5
      cycle_late_max_exposure: 1.0
      cycle_hysteresis_bars: 3

  # Try very mild late protection only (no early change)
  - name: v11_cycle_late_only
    strategy: v11_hybrid
    description: "Cycle: only mild late bull protection"
    params:
      enable_cycle_phase: true
      cycle_early_aggression: 1.0
      cycle_early_trail_mult: 3.5
      cycle_late_aggression: 0.90
      cycle_late_trail_mult: 3.0
      cycle_late_max_exposure: 0.90

  # Best performer from round 1 for comparison
  - name: v11_cycle_early_fast_ref
    strategy: v11_hybrid
    description: "Reference: cycle early only, 3-bar hysteresis"
    params:
      enable_cycle_phase: true
      cycle_hysteresis_bars: 3
      cycle_late_aggression: 1.0
      cycle_late_trail_mult: 3.5
      cycle_late_max_exposure: 1.0
      cycle_early_trail_mult: 3.5
