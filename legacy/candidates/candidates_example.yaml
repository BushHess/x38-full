candidates:
  - name: apex_default
    description: "V8 Apex with all defaults"
    params: {}

  - name: apex_wide_trail
    description: "Wide trailing stop, slow VDO"
    params:
      trail_atr_mult: 5.0
      vdr_fast_period: 12
      fixed_stop_pct: 0.18
    param_ranges:
      trail_atr_mult: [4.5, 5.0, 5.5, 6.0]
      vdr_fast_period: [8, 10, 12]
      fixed_stop_pct: [0.15, 0.18, 0.20]

  - name: apex_conservative
    description: "Tighter stops, lower exposure"
    params:
      trail_atr_mult: 3.0
      fixed_stop_pct: 0.12
      emergency_dd_pct: 0.20
      max_total_exposure: 0.80
      entry_aggression: 0.70

  - name: apex_aggressive
    description: "Wide stops, high exposure, fast VDO"
    params:
      trail_atr_mult: 6.5
      fixed_stop_pct: 0.22
      emergency_dd_pct: 0.35
      vdr_fast_period: 8
      entry_aggression: 1.0
      max_total_exposure: 1.0
